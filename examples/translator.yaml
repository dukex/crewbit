provider: jira

providers:
  jira:
    baseUrl: https://your-org.atlassian.net
    projectKey: I18N
    transitionIds:
      Start: "61"     # To Translate → In Progress
      Done: "62"      # In Progress → Done
    issueTypes:
      subtask: "10002"

# Translates i18n tickets and marks them done.
transitions:
  Start:
    from: To Translate
    command: /translate

agent:
  planCommentMarker: "Claude translation plan"

daemon:
  waitSeconds: 30
  maxSessionSeconds: 1800
  worktreePrefix: translator
